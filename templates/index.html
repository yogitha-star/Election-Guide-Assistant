<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyVote Guide AI</title>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-layout">
        
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Quick Actions</h2>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-btn suggestion-btn" data-query="How to vote">
                    <span class="icon">🗳️</span> How to Vote
                </button>
                <button class="nav-btn suggestion-btn" data-query="Register voter">
                    <span class="icon">📝</span> Register Voter
                </button>
                <button class="nav-btn suggestion-btn" data-query="Election process">
                    <span class="icon">📊</span> Election Process
                </button>
            </nav>
            <div class="sidebar-footer">
                <p>MyVote Guide AI &copy; 2026</p>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            
            <!-- Sticky Header -->
            <header class="top-header">
                <div class="header-left">
                    <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
                    <h1>MyVote Guide AI 🇮🇳</h1>
                </div>
                <div class="header-controls">
                    <select id="language-select" class="lang-dropdown">
                        <option value="english">English</option>
                        <option value="telugu">Telugu</option>
                    </select>
                </div>
            </header>

            <!-- Chat Area -->
            <div class="chat-container">
                <div class="chat-messages" id="chat-messages">
                    <!-- Initial Welcome Message -->
                    <div class="message bot-message">
                        <div class="message-card">
                            <p>Hello! 👋 I'm your Election Guide Assistant. How can I help you today?</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom Input Area -->
            <div class="bottom-area">
                <div class="quick-suggestions-bottom" id="quick-suggestions">
                    <!-- Additional chips if needed -->
                    <button class="chip suggestion-btn" data-query="What is voter ID">What is voter ID?</button>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
                    <button id="send-btn" class="send-btn" aria-label="Send message">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>

        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
